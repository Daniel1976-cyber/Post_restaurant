<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Los Taínos — Cocina</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#f59e0b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #1e1e1e;
      color: white;
    }

    h1 {
      text-align: center;
      padding: 15px;
      margin: 0;
      background: black;
    }

    .contenedor {
      display: flex;
      flex-wrap: wrap;
      padding: 10px;
    }

    .pedido {
      width: 300px;
      margin: 10px;
      padding: 15px;
      border-radius: 10px;
    }

    .pendiente {
      background: #d32f2f;
    }

    .preparacion {
      background: #f57c00;
    }

    .listo {
      background: #388e3c;
    }

    h2 {
      margin: 0 0 10px 0;
    }

    ul {
      padding-left: 20px;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
    }

    .btn-prep {
      background: #ff9800;
      color: black;
    }

    .btn-listo {
      background: #4caf50;
      color: white;
    }

    .btn-recogido {
      background: #2196f3;
      color: white;
    }
  </style>

</head>
<body>

<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 16px 0 16px;">
  <h1 style="margin:0;">🍳 Pantalla de Cocina</h1>
  <button class="btn-logout" onclick="logout()">Salir</button>
</div>

<div class="contenedor" id="pedidos"></div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const SUPABASE_URL = "https://oyurzisrjxxdqkxcxzae.supabase.co";
const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im95dXJ6aXNyanh4ZHFreGN4emFlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5MzI5NjQsImV4cCI6MjA5MTUwODk2NH0.LFZiRwZNTpNh07Zdx2XgruCUmJbSv8O0NnklXw8Px_o";
const supabase = createClient(SUPABASE_URL, SUPABASE_ANON);

// --- PWA: Register Service Worker ---
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(err => console.log('SW registration failed:', err));
  });
}

// Auth check
const { data: authData, error: authErr } = await supabase.auth.getUser();
const rol = localStorage.getItem('rol');
if (authErr || !authData.user || rol !== 'cocina') {
  localStorage.removeItem('rol');
  window.location.href = '/login.html';
}
async function cargarPedidos() {
  const { data: pedidos } = await supabase.from("pedidos").select("*").order("id", { ascending: false });
  const { data: detalle } = await supabase.from("detalle").select("*");
  const { data: productos } = await supabase.from("productos").select("*");

  if (!pedidos) return;

  let html = "";
  pedidos.forEach(pedido => {
    if (pedido.estado === "recogido" || pedido.estado === "pagado") return;

    let clase = "pendiente";
    if (pedido.estado === "en preparación") clase = "preparacion";
    if (pedido.estado === "listo") clase = "listo";

    let items = (detalle || []).filter(d => d.pedido_id === pedido.id);

    html += `
      <div class="pedido ${clase}">
        <h2>${pedido.mesa}</h2>
        <p><strong>${pedido.estado.toUpperCase()}</strong></p>
        <ul>
          ${items.map(i => `<li>${i.producto} x${i.cantidad}</li>`).join("")}
        </ul>
        ${
          pedido.estado === "pendiente"
          ? `<button class="btn-prep" onclick="cambiarEstado(${pedido.id}, 'en preparación')">👨‍🍳 Preparando</button>`
          : ""
        }
        ${
          pedido.estado === "en preparación"
          ? `<button class="btn-listo" onclick="cambiarEstado(${pedido.id}, 'listo')">✅ Listo</button>`
          : ""
        }
        ${
          pedido.estado === "listo"
          ? `<button class="btn-recogido" onclick="cambiarEstado(${pedido.id}, 'recogido')">📤 Recogido</button>`
          : ""
        }
      </div>
    `;
  });

  document.getElementById("pedidos").innerHTML = html || '<p style="text-align:center;width:100%;padding:50px;">No hay pedidos</p>';
}

window.cambiarEstado = async function(id, estado) {
  await supabase.from("pedidos").update({ estado }).eq("id", id);
  cargarPedidos();
}

window.logout = async function() {
  await supabase.auth.signOut();
  localStorage.removeItem("rol");
  window.location.href = "/login.html";
}

// ── REALTIME ──
supabase.channel('pos-cocina')
  .on('postgres_changes', { event: '*', schema: 'public', table: 'pedidos' }, cargarPedidos)
  .on('postgres_changes', { event: '*', schema: 'public', table: 'detalle' }, cargarPedidos)
  .subscribe();

cargarPedidos();
</script>
</body>
</html>
