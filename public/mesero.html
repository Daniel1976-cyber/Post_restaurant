<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Los Taínos — Mesero</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#f59e0b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080c14;
      --surface: #0f1420;
      --surface2: #161c2d;
      --border: rgba(255,255,255,0.07);
      --accent: #f59e0b;
      --accent2: #fbbf24;
      --success: #10b981;
      --danger: #ef4444;
      --indigo: #6366f1;
      --text: #f1f5f9;
      --muted: #64748b;
      --muted2: #94a3b8;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── NAVBAR ── */
    .navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      height: 56px;
      background: #0a0e1a;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      gap: 16px;
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 17px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.3px;
    }

    .nav-badge {
      background: rgba(245,158,11,0.15);
      border: 1px solid rgba(245,158,11,0.3);
      color: var(--accent);
      border-radius: 6px;
      padding: 3px 10px;
      font-size: 12px;
      font-weight: 600;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .live-dot {
      width: 8px; height: 8px;
      background: var(--success);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    .live-label { font-size: 12px; color: var(--success); font-weight: 500; }

    .btn-logout {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      color: var(--muted2);
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 13px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: all 0.2s;
    }

    .btn-logout:hover { background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.3); color: #fca5a5; }

    /* ── MAIN LAYOUT ── */
    .container {
      display: grid;
      grid-template-columns: 220px 1fr 300px;
      flex: 1;
      overflow: hidden;
    }

    .panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel-header {
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .panel-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
    }

    .panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.1) transparent;
    }

    /* ── MESAS ── */
    .panel-mesas {
      background: var(--surface);
      border-right: 1px solid var(--border);
    }

    .mesa-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .mesa-card {
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: all 0.15s;
      border: 2px solid transparent;
      position: relative;
    }

    .mesa-card:hover { transform: translateY(-2px); }
    .mesa-card:active { transform: scale(0.95); }

    .mesa-card .mesa-icon { font-size: 20px; }
    .mesa-card .mesa-name { font-size: 13px; font-weight: 600; }
    .mesa-card .mesa-status { font-size: 10px; font-weight: 500; opacity: 0.7; }

    .mesa-libre {
      background: rgba(16,185,129,0.12);
      border-color: rgba(16,185,129,0.25);
      color: #34d399;
    }

    .mesa-libre:hover { background: rgba(16,185,129,0.2); border-color: rgba(16,185,129,0.4); }

    .mesa-ocupada {
      background: rgba(99,102,241,0.15);
      border-color: rgba(99,102,241,0.35);
      color: #a5b4fc;
    }

    .mesa-seleccionada {
      background: rgba(245,158,11,0.18);
      border-color: rgba(245,158,11,0.5);
      color: var(--accent2);
      box-shadow: 0 0 20px rgba(245,158,11,0.15);
    }

    /* ── PRODUCTOS ── */
    .panel-productos {
      background: var(--bg);
      border-right: 1px solid var(--border);
    }

    .categoria-label {
      font-size: 10.5px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--accent);
      padding: 10px 4px 6px;
    }

    .producto-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 8px;
      margin-bottom: 4px;
    }

    .producto-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 12px;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
      position: relative;
      overflow: hidden;
    }

    .producto-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(245,158,11,0.08), transparent);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .producto-card:hover::before { opacity: 1; }
    .producto-card:hover { border-color: rgba(245,158,11,0.35); transform: translateY(-1px); }
    .producto-card:active { transform: scale(0.95); }

    .producto-card.flash {
      animation: flash 0.35s ease;
    }

    @keyframes flash {
      0% { background: var(--surface); }
      50% { background: rgba(16,185,129,0.25); border-color: rgba(16,185,129,0.5); }
      100% { background: var(--surface); }
    }

    .prod-name { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
    .prod-price { font-size: 14px; font-weight: 700; color: var(--accent); }

    /* ── PEDIDO PANEL ── */
    .panel-pedido {
      background: var(--surface);
    }

    .pedido-mesa-info {
      padding: 14px 16px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .pedido-mesa-label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 3px;
    }

    .pedido-mesa-name {
      font-size: 18px;
      font-weight: 700;
      color: var(--accent);
    }

    .pedido-items-wrap {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
    }

    .pedido-item {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      margin-bottom: 6px;
      animation: slideIn 0.2s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(10px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .item-info { flex: 1; min-width: 0; }
    .item-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item-precio { font-size: 11px; color: var(--muted2); }
    .item-subtotal { font-size: 14px; font-weight: 700; color: var(--accent); }

    .item-controls {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .ctrl-btn {
      width: 26px; height: 26px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      font-weight: 700;
    }

    .ctrl-btn:hover { transform: scale(1.1); }

    .btn-minus { background: rgba(239,68,68,0.2); color: #fca5a5; }
    .btn-plus  { background: rgba(16,185,129,0.2); color: #6ee7b7; }
    .btn-del   { background: rgba(100,116,139,0.2); color: var(--muted2); }
    .item-qty  { font-size: 14px; font-weight: 700; min-width: 18px; text-align: center; }

    .pedido-footer {
      padding: 14px;
      background: var(--surface2);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .total-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .total-label { font-size: 13px; color: var(--muted2); }
    .total-amount { font-size: 24px; font-weight: 800; color: var(--accent); }

    .btn-enviar {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #f59e0b, #d97706);
      color: #080400;
      border: none;
      border-radius: 10px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.2px;
    }

    .btn-enviar:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(245,158,11,0.35);
    }

    .btn-enviar:disabled {
      background: rgba(255,255,255,0.06);
      color: var(--muted);
      cursor: not-allowed;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 150px;
      gap: 8px;
    }

    .empty-icon { font-size: 36px; opacity: 0.3; }
    .empty-text { font-size: 13px; color: var(--muted); text-align: center; }

    /* ── TOAST ── */
    #toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
    }

    .toast {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-left: 3px solid var(--success);
      border-radius: 10px;
      padding: 12px 18px;
      font-size: 13.5px;
      font-weight: 500;
      color: var(--text);
      animation: toastIn 0.3s ease;
      min-width: 220px;
    }

    .toast.warn { border-left-color: var(--accent); }

    @keyframes toastIn {
      from { opacity: 0; transform: translateX(20px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes toastOut {
      from { opacity: 1; transform: translateX(0); }
      to { opacity: 0; transform: translateX(20px); }
    }

    /* ── RESPONSIVE MOBILE LAYOUT ── */
    @media (max-width: 900px) {
      .container {
        display: block;
        overflow-y: auto;
        padding-bottom: 35vh; /* Space to scroll past the fixed footer */
      }
      .panel-mesas {
        border-right: none;
        border-bottom: 1px solid var(--border);
        height: auto;
      }
      .mesa-grid {
        display: flex;
        overflow-x: auto;
        padding-bottom: 2px;
        gap: 8px;
        flex-wrap: nowrap;
      }
      .mesa-card {
        min-width: 90px;
        height: 70px;
      }
      .panel-productos {
        border-right: none;
        border-bottom: none;
        height: auto;
      }
      .panel-pedido {
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 35vh;
        z-index: 1000;
        background: var(--surface);
        border-top: 2px solid var(--accent);
        box-shadow: 0 -10px 25px rgba(0,0,0,0.5);
      }
    }
  </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="nav-brand">🍽️ Los Taínos <span class="nav-badge">Mesero</span></div>
  <div class="nav-right">
    <div class="live-dot"></div>
    <span class="live-label">En vivo</span>
    <button class="btn-logout" onclick="logout()">Salir</button>
  </div>
</nav>

<!-- MAIN LAYOUT -->
<div class="container">

  <!-- MESAS -->
  <div class="panel panel-mesas">
    <div class="panel-header"><div class="panel-title">🪑 Mesas</div></div>
    <div class="panel-body">
      <div class="mesa-grid" id="mesa-grid"></div>
    </div>
  </div>

  <!-- MENÚ -->
  <div class="panel panel-productos">
    <div class="panel-header"><div class="panel-title">📋 Menú</div></div>
    <div class="panel-body" id="menu-body"></div>
  </div>

  <!-- PEDIDO ACTUAL -->
  <div class="panel panel-pedido" style="display:flex;flex-direction:column;">
    <div class="pedido-mesa-info">
      <div class="pedido-mesa-label">Mesa activa</div>
      <div class="pedido-mesa-name" id="pedido-mesa">— Selecciona una mesa</div>
    </div>
    <div class="pedido-items-wrap" id="pedido-items"></div>
    <div class="pedido-footer">
      <div class="total-row">
        <span class="total-label">Total del pedido</span>
        <span class="total-amount" id="pedido-total">$0</span>
      </div>
      <button class="btn-enviar" id="btn-enviar" disabled onclick="enviarPedido()">
        📤 Enviar a Cocina
      </button>
    </div>
  </div>

</div>

<!-- TOAST -->
<div id="toast-container"></div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const SUPABASE_URL = "https://oyurzisrjxxdqkxcxzae.supabase.co";
const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im95dXJ6aXNyanh4ZHFreGN4emFlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5MzI5NjQsImV4cCI6MjA5MTUwODk2NH0.LFZiRwZNTpNh07Zdx2XgruCUmJbSv8O0NnklXw8Px_o";
const supabase = createClient(SUPABASE_URL, SUPABASE_ANON);

// --- PWA: Register Service Worker ---
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(err => console.log('SW registration failed:', err));
  });
}

// Auth check
const { data: authData, error: authErr } = await supabase.auth.getUser();
const rol = localStorage.getItem('rol');
if (authErr || !authData.user || rol !== 'mesero') {
  localStorage.removeItem('rol');
  window.location.href = '/login.html';
}

let pedidoId = null;
let mesaSeleccionada = null;
let cachedData = null;

// ── TOAST ──
function toast(msg, warn = false) {
  const el = document.createElement('div');
  el.className = 'toast' + (warn ? ' warn' : '');
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => {
    el.style.animation = 'toastOut 0.3s ease forwards';
    setTimeout(() => el.remove(), 300);
  }, 2500);
}

// ── CARGAR DATOS (Directo de Supabase) ──
async function cargar() {
  const { data: pedidos, error: e1 } = await supabase.from("pedidos").select("*").order("id", { ascending: false });
  const { data: detalle, error: e2 } = await supabase.from("detalle").select("*");
  const { data: productos, error: e3 } = await supabase.from("productos").select("*");
  const { data: mesas, error: e4 } = await supabase.from("mesas").select("*");
  
  if (e1) console.error("Error pedidos:", e1.message);
  if (e2) console.error("Error detalle:", e2.message);
  if (e3) console.error("Error productos:", e3.message);
  if (e4) console.error("Error mesas:",    e4.message);

  cachedData = {
    pedidos: pedidos || [],
    detalle: detalle || [],
    productos: productos || [],
    mesas: mesas || []
  };

  renderMesas(cachedData);
  renderMenu(cachedData);
  renderPedido(cachedData);
}

function renderMesas(data) {
  const grid = document.getElementById('mesa-grid');
  if (!data.mesas || data.mesas.length === 0) {
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:20px;color:#64748b;font-size:12px;">Sin mesas registradas</div>`;
    return;
  }
  grid.innerHTML = data.mesas.map(m => {
    const enPedido = (data.pedidos || []).find(p => p.mesa === m.nombre && p.estado !== 'pagado' && p.estado !== 'recogido');
    const seleccionada = mesaSeleccionada === m.nombre;
    const ocupada = enPedido && !seleccionada;
    let cls, icon, status, onclick;
    if (seleccionada) {
      cls = 'mesa-seleccionada'; icon = '📋'; status = 'Activa';
      onclick = `seleccionarMesa('${m.nombre}')`;
    } else if (ocupada) {
      cls = 'mesa-ocupada'; icon = '🔴'; status = 'Ocupada';
      onclick = `cargarPedidoExistente('${m.nombre}', ${enPedido.id})`;
    } else {
      cls = 'mesa-libre'; icon = '✅'; status = 'Libre';
      onclick = `seleccionarMesa('${m.nombre}')`;
    }
    return `<div class="mesa-card ${cls}" onclick="${onclick}">
      <span class="mesa-icon">${icon}</span>
      <span class="mesa-name">${m.nombre}</span>
      <span class="mesa-status">${status}</span>
    </div>`;
  }).join('');
}

function renderMenu(data) {
  const body = document.getElementById('menu-body');
  if (!data.productos || data.productos.length === 0) {
    body.innerHTML = `<div style="text-align:center;padding:40px;color:#64748b;font-size:13px;">Sin productos en el menú</div>`;
    return;
  }
  const cats = {};
  data.productos.forEach(p => {
    const cat = p.categoria || 'General';
    if (!cats[cat]) cats[cat] = [];
    cats[cat].push(p);
  });
  body.innerHTML = Object.entries(cats).map(([cat, prods]) => `
    <div class="categoria-label">${cat}</div>
    <div class="producto-grid">
      ${prods.map(p => `
        <div class="producto-card" id="prod-${p.nombre.replace(/\s/g,'_')}" onclick="agregar('${p.nombre}', this)">
          <div class="prod-name">${p.nombre}</div>
          <div class="prod-price">$${p.precio}</div>
        </div>
      `).join('')}
    </div>
  `).join('');
}

function renderPedido(data) {
  if (!pedidoId) {
    document.getElementById('pedido-items').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🍽️</div>
        <div class="empty-text">Selecciona una mesa para<br>comenzar el pedido</div>
      </div>`;
    document.getElementById('pedido-total').textContent = '$0';
    document.getElementById('btn-enviar').disabled = true;
    return;
  }

  const pedido = (data.pedidos || []).find(p => p.id === pedidoId);
  if (!pedido) { pedidoId = null; mesaSeleccionada = null; renderPedido(data); return; }

  document.getElementById('pedido-mesa').textContent = pedido.mesa;
  const items = (data.detalle || []).filter(d => d.pedido_id === pedidoId);

  if (items.length === 0) {
    document.getElementById('pedido-items').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🛒</div>
        <div class="empty-text">Agrega productos del menú</div>
      </div>`;
  } else {
    document.getElementById('pedido-items').innerHTML = items.map(i => {
      const prod = (data.productos || []).find(p => p.nombre === i.producto);
      const precio = prod?.precio || 0;
      return `<div class="pedido-item">
        <div class="item-info">
          <div class="item-name">${i.producto}</div>
          <div class="item-precio">$${precio} c/u</div>
        </div>
        <div class="item-controls">
          <button class="ctrl-btn btn-minus" onclick="cambiarCantidad(${i.id}, -1)">−</button>
          <span class="item-qty">${i.cantidad}</span>
          <button class="ctrl-btn btn-plus" onclick="cambiarCantidad(${i.id}, 1)">+</button>
          <button class="ctrl-btn btn-del" onclick="eliminarItem(${i.id})">×</button>
        </div>
        <div class="item-subtotal">$${precio * i.cantidad}</div>
      </div>`;
    }).join('');
  }

  document.getElementById('pedido-total').textContent = '$' + (pedido.total || 0);
  document.getElementById('btn-enviar').disabled = pedido.estado !== 'pendiente' || items.length === 0;
}

// ── ACCIONES ──
window.seleccionarMesa = async function(mesa) {
  mesaSeleccionada = mesa;
  document.getElementById('pedido-mesa').textContent = mesa;
  
  const { data, error } = await supabase
    .from("pedidos")
    .insert([{ id: Date.now(), mesa: mesa, estado: "pendiente", total: 0 }])
    .select()
    .single();

  if (error) { toast('❌ Error al crear pedido: ' + error.message, true); return; }
  
  pedidoId = data.id;
  cargar();
};

window.cargarPedidoExistente = function(mesa, id) {
  mesaSeleccionada = mesa;
  pedidoId = id;
  document.getElementById('pedido-mesa').textContent = mesa;
  cargar();
};

window.agregar = async function(producto, el) {
  if (!pedidoId) { toast('⚠️ Selecciona una mesa primero', true); return; }
  el.classList.add('flash');
  setTimeout(() => el.classList.remove('flash'), 350);

  // Insertar detalle
  const { error: errorDetalle } = await supabase.from("detalle").insert([{
    pedido_id: pedidoId,
    producto: producto,
    cantidad: 1
  }]);

  if (errorDetalle) { toast('❌ Error: ' + errorDetalle.message, true); return; }

  // Recalcular total del pedido
  const { data: productos } = await supabase.from("productos").select("*").eq("nombre", producto).single();
  const { data: pedido } = await supabase.from("pedidos").select("*").eq("id", pedidoId).single();
  
  const nuevoTotal = (pedido.total || 0) + (productos.precio * 1);
  await supabase.from("pedidos").update({ total: nuevoTotal }).eq("id", pedidoId);

  toast('✅ ' + producto + ' agregado');
  cargar();
};

window.cambiarCantidad = async function(itemId, delta) {
  const { data: item } = await supabase.from("detalle").select("*").eq("id", itemId).single();
  if (!item) return;

  const nuevaCant = item.cantidad + delta;
  
  if (nuevaCant <= 0) {
    await supabase.from("detalle").delete().eq("id", itemId);
  } else {
    await supabase.from("detalle").update({ cantidad: nuevaCant }).eq("id", itemId);
  }

  // Recalcular total del pedido (más simple: cargar todo de nuevo)
  const { data: items } = await supabase.from("detalle").select("*").eq("pedido_id", item.pedido_id);
  let nuevoTotal = 0;
  for (const i of (items || [])) {
    const { data: p } = await supabase.from("productos").select("precio").eq("nombre", i.producto).single();
    if (p) nuevoTotal += p.precio * i.cantidad;
  }
  await supabase.from("pedidos").update({ total: nuevoTotal }).eq("id", item.pedido_id);
  
  cargar();
};

window.eliminarItem = async function(itemId) {
  if (!confirm('¿Eliminar este producto?')) return;
  const { data: item } = await supabase.from("detalle").select("*").eq("id", itemId).single();
  if (!item) return;

  await supabase.from("detalle").delete().eq("id", itemId);

  // Recalcular total
  const { data: items } = await supabase.from("detalle").select("*").eq("pedido_id", item.pedido_id);
  let nuevoTotal = 0;
  for (const i of (items || [])) {
    const { data: p } = await supabase.from("productos").select("precio").eq("nombre", i.producto).single();
    if (p) nuevoTotal += p.precio * i.cantidad;
  }
  await supabase.from("pedidos").update({ total: nuevoTotal }).eq("id", item.pedido_id);
  
  cargar();
};

window.enviarPedido = async function() {
  if (!pedidoId) return;
  const { error } = await supabase.from("pedidos").update({ estado: 'pendiente' }).eq("id", pedidoId);
  if (error) { toast('❌ Error al enviar: ' + error.message, true); return; }

  toast('📤 Pedido enviado a cocina!', true);
  pedidoId = null;
  mesaSeleccionada = null;
  document.getElementById('pedido-mesa').textContent = '— Selecciona una mesa';
  cargar();
};

window.logout = async function() {
  await supabase.auth.signOut();
  localStorage.removeItem('rol');
  window.location.href = '/login.html';
};

// ── REALTIME ──
supabase.channel('pos-mesero')
  .on('postgres_changes', { event: '*', schema: 'public', table: 'pedidos' }, cargar)
  .on('postgres_changes', { event: '*', schema: 'public', table: 'detalle' }, cargar)
  .subscribe();

// Fallback polling cada 60s (Sincronización principal es vía Realtime)
// Sincronización proactiva cada 60s (Realtime se encarga del resto)
setInterval(cargar, 60000);
cargar();
</script>
